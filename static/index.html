<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yablonsky video / wedding videographer</title>
    <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
<header class="header">
    <a href="#hero" class="logo-container" id="logo-wrapper">
    <img src="assets/Logo_grey-2-3.svg" alt="Yablonsky Video">
    <nav class="nav">
        <a href="#hero" data-i18n="nav_home">ГОЛОВНА</a>
        <div class="dropdown">
            <a href="#portfolio" class="dropbtn" id="main-portfolio-btn" data-i18n="nav_portfolio">ПОРТФОЛІО ▾</a>
            <div class="dropdown-content">
                <a href="#portfolio" data-category="wedding" data-i18n="nav_wedding">ВЕСІЛЛЯ</a>
                <a href="#portfolio" data-category="lovestory" data-i18n="nav_lovestory">ЛАВ СТОРІ</a>
                <a href="#portfolio" data-category="family" data-i18n="nav_family">СІМЕЙНІ/ХРЕСТИНИ</a>
            </div>
        </div>
        <a href="#prices" data-i18n="nav_prices">ПРАЙС</a>
        <a href="#reviews" data-i18n="nav_reviews">ВІДГУКИ</a>
        <a href="#about" data-i18n="nav_about">ПРО НАС</a>
        <a href="#contacts" data-i18n="nav_contacts">КОНТАКТИ</a>
    </nav>
    <div class="header-actions">
        <button id="lang-toggle" class="lang-btn">EN</button>
        <button id="theme-toggle">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <button id="mobile-menu-btn" class="mobile-only">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </div>
</header>

<div class="mobile-nav-overlay" id="mobile-nav">
    <button id="close-mobile-nav">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <a href="#hero" class="mob-link" data-i18n="nav_home">ГОЛОВНА</a>
    <a href="#portfolio" class="mob-link" data-i18n="nav_portfolio">ПОРТФОЛІО</a>
    <a href="#prices" class="mob-link" data-i18n="nav_prices">ПРАЙС</a>
    <a href="#reviews" class="mob-link" data-i18n="nav_reviews">ВІДГУКИ</a>
    <a href="#about" class="mob-link" data-i18n="nav_about">ПРО НАС</a>
    <a href="#contacts" class="mob-link" data-i18n="nav_contacts">КОНТАКТИ</a>
</div>

<section id="hero" class="hero">
    <video class="hero-bg" id="main-bg-video" autoplay loop muted playsinline>
        <source src="assets/bg-video.mp4" type="video/mp4">
    </video>
</section>

<section id="portfolio" class="portfolio-section fade-in">
    <div class="portfolio-header">
        <h2 class="section-title" data-i18n="section_portfolio">Портфоліо</h2>
        <div class="portfolio-filters" id="portfolio-filters">
            <button class="filter-btn active" data-filter="all" data-i18n="btn_all">Всі роботи</button>
            <button class="filter-btn" data-filter="wedding" data-i18n="btn_wed">Весілля</button>
            <button class="filter-btn" data-filter="lovestory" data-i18n="btn_love">Лав сторі</button>
            <button class="filter-btn" data-filter="family" data-i18n="btn_fam">Сімейні</button>
        </div>
    </div>
    <div class="carousel-container">
        <button class="carousel-btn prev" id="car-prev">❮</button>
        <div class="carousel-viewport">
            <div class="carousel-track" id="portfolio-grid"></div>
        </div>
        <button class="carousel-btn next" id="car-next">❯</button>
    </div>
</section>

<section id="prices" class="prices-section fade-in">
    <h2 class="section-title" data-i18n="section_prices">Прайс</h2>
    <div class="price-grid" id="price-grid-container"></div>
</section>

<section id="about" class="about-section fade-in">
    <h2 class="section-title" data-i18n="section_about">Про нас</h2>
    <div class="section-container">
        <div class="about-grid">
            <div class="about-image">
                <img src="" id="about-img">
            </div>
            <div class="about-text" id="about-text-container"></div>
        </div>
    </div>
</section>

<section id="reviews" class="reviews-section fade-in">
    <h2 class="section-title" data-i18n="section_reviews">Відгуки</h2>
    <div class="carousel-container">
        <button class="carousel-btn prev" id="rev-prev">❮</button>
        <div class="carousel-viewport">
            <div class="carousel-track" id="reviews-grid"></div>
        </div>
        <button class="carousel-btn next" id="rev-next">❯</button>
    </div>
</section>

<section id="contacts" class="contacts-section fade-in">
    <div class="central-content">
        <h2 id="contact-title"></h2>
        <p id="contact-subtitle"></p>

        <div class="separator"></div>

        <p class="insta-text" data-i18n="insta_text">Більше нових відео в нашому instagram:</p>

        <a href="#" class="instagram-main" id="main-insta-link" target="_blank" rel="noopener noreferrer">
            <img src="assets/inst.png" class="insta-img">
        </a>

        <div class="phones">
            <a href="#" id="phone1" class="phone-link">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                <span id="phone1-text"></span>
            </a>
            <a href="#" id="phone2" class="phone-link">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                <span id="phone2-text"></span>
            </a>
        </div>

        <div class="social-icons">
            <a href="#" class="social-link" id="tg-link" target="_blank" rel="noopener noreferrer">
                <img src="assets/tg.png" class="social-img">
            </a>
            <a href="#" class="social-link" id="tt-link" target="_blank" rel="noopener noreferrer">
                <img src="assets/tik-tok.png" class="social-img">
            </a>
            <a href="#" class="social-link" id="fb-link" target="_blank" rel="noopener noreferrer">
                <img src="assets/facebook.png" class="social-img">
            </a>
        </div>
    </div>
</section>

<button id="scrollTopBtn" class="scroll-top-btn">▲</button>

<footer class="footer">
    <p id="footer-text" data-i18n="footer_text">© 2026 by Yablonskyvideo | Усі права захищені</p>
</footer>

<script src="lang.js"></script>
<script src="script.js"></script>
</body>
</html>
